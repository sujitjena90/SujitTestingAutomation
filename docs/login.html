<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SJ MegaMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page" data-page="login">
  <main class="auth-layout">
    <section class="auth-card" aria-labelledby="loginHeading">
      <a class="auth-brand" href="index.html" aria-label="SJ MegaMart home">
        <span class="auth-brand__mark">SJ MegaMart</span>
        <span class="auth-brand__sub">Fast delivery for Bhubaneswar shoppers</span>
      </a>
      <div class="auth-card__header">
        <h1 id="loginHeading">Welcome Back</h1>
        <p>Login to continue shopping, checkout faster and track your orders.</p>
      </div>
      <form id="loginForm" class="auth-form" novalidate>
        <label class="auth-field">
          <span>Email</span>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">✉️</span>
            <input id="loginEmail" type="email" placeholder="Enter your email" autocomplete="email" required>
          </div>
        </label>
        <label class="auth-field">
          <span>Password</span>
          <div class="auth-input-wrap auth-input-wrap--password">
            <span class="auth-input-icon">🔒</span>
            <input id="loginPassword" type="password" placeholder="Enter your password" autocomplete="current-password" required minlength="6">
            <button class="password-toggle" type="button" data-password-toggle="loginPassword" aria-label="Show password">👁️</button>
          </div>
        </label>
        <div class="auth-row auth-row--end">
          <button class="auth-link-button" id="forgotPasswordLink" type="button">Forgot Password?</button>
        </div>
        <button class="primary-btn primary-btn--full auth-submit" id="loginSubmitBtn" type="submit">Login</button>
        <p class="auth-message auth-message--error" id="loginError" hidden></p>
        <p class="auth-message auth-message--success" id="loginSuccess" hidden></p>
      </form>
      <div class="auth-divider"><span>OR</span></div>
      <button class="social-auth-btn" id="googleLoginBtn" type="button">
        <span class="google-mark" aria-hidden="true">G</span>
        <span>Sign in with Google</span>
      </button>
      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
