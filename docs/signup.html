<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | SJ MegaMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page" data-page="signup">
  <main class="auth-layout">
    <section class="auth-card" aria-labelledby="signupHeading">
      <a class="auth-brand" href="index.html" aria-label="SJ MegaMart home">
        <span class="auth-brand__mark">SJ MegaMart</span>
        <span class="auth-brand__sub">Create your account and start ordering faster</span>
      </a>
      <div class="auth-card__header">
        <h1 id="signupHeading">Create Account</h1>
        <p>Save addresses, manage your profile and view all your previous orders.</p>
      </div>
      <form id="signupForm" class="auth-form" novalidate>
        <label class="auth-field">
          <span>Full Name</span>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">👤</span>
            <input id="signupName" type="text" placeholder="Enter your full name" autocomplete="name" required>
          </div>
        </label>
        <label class="auth-field">
          <span>Email</span>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">✉️</span>
            <input id="signupEmail" type="email" placeholder="Enter your email" autocomplete="email" required>
          </div>
        </label>
        <label class="auth-field">
          <span>Phone Number</span>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">📞</span>
            <input id="signupPhone" type="tel" placeholder="10 digit mobile number" autocomplete="tel" maxlength="10" required>
          </div>
        </label>
        <label class="auth-field">
          <span>Password</span>
          <div class="auth-input-wrap auth-input-wrap--password">
            <span class="auth-input-icon">🔒</span>
            <input id="signupPassword" type="password" placeholder="Minimum 6 characters" autocomplete="new-password" required minlength="6">
            <button class="password-toggle" type="button" data-password-toggle="signupPassword" aria-label="Show password">👁️</button>
          </div>
          <div class="password-strength" aria-live="polite">
            <div class="password-strength__bar"><span id="passwordStrengthBar"></span></div>
            <small id="passwordStrengthLabel">Password strength: weak</small>
          </div>
        </label>
        <label class="auth-field">
          <span>Confirm Password</span>
          <div class="auth-input-wrap auth-input-wrap--password">
            <span class="auth-input-icon">✅</span>
            <input id="signupConfirmPassword" type="password" placeholder="Re-enter your password" autocomplete="new-password" required minlength="6">
            <button class="password-toggle" type="button" data-password-toggle="signupConfirmPassword" aria-label="Show password">👁️</button>
          </div>
        </label>
        <button class="primary-btn primary-btn--full auth-submit" id="signupSubmitBtn" type="submit">Sign Up</button>
        <p class="auth-message auth-message--error" id="signupError" hidden></p>
        <p class="auth-message auth-message--success" id="signupSuccess" hidden></p>
      </form>
      <div class="auth-divider"><span>OR</span></div>
      <button class="social-auth-btn" id="googleSignupBtn" type="button">
        <span class="google-mark" aria-hidden="true">G</span>
        <span>Sign up with Google</span>
      </button>
      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
